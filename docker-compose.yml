name: openhim

networks:
  openhim:

volumes:
  mongo-data:
  hapi-db-data:

services:
  hapi-db:
    container_name: hapi-db
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - openhim
    environment:
      POSTGRES_DB: hapi
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5432"
    volumes:
      - hapi-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d hapi || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
  mongo-db:
    container_name: mongo-db
    image: mongo:4.0
    networks:
      - openhim
    volumes:
      - "mongo-data:/data/db"
    restart: unless-stopped

  openhim-core:
    container_name: openhim-core
    image: jembi/openhim-core:latest
    restart: unless-stopped
    environment:
      mongo_url: "mongodb://mongo-db/openhim-development"
      mongo_atnaUrl: "mongodb://mongo-db/openhim-development"
      NODE_ENV: "development"
      # Enable Basic auth for clients and other auth modes for later experimentation
      api_authenticationTypes: '["local","basic","token","openid"]'
    ports:
      - "8080:8080"   # OpenHIM Core API (used by Console + Mediators)
      - "5000:5000"   # Secure transaction port (HTTPS)
      - "5001:5001"   # Non-secure transaction port (HTTP)
    networks:
      - openhim
    healthcheck:
      test: "curl -sSk https://openhim-core:8080/heartbeat || exit 1"
      interval: 30s
      timeout: 30s
      retries: 3
    depends_on:
      - mongo-db

  # openhim-console:
  #   container_name: openhim-console
  #   image: organsushi/medisha-him:latest
  #   restart: unless-stopped
  #   networks:
  #     - openhim
  #   ports:
  #     - "9000:80"
  #   healthcheck:
  #     test: "curl -sS http://openhim-console || exit 1"
  #     interval: 30s
  #     timeout: 30s
  #     retries: 3
  #   depends_on:
  #     - openhim-core

  openhim-console:
    container_name: openhim-console
    image: organsushi/medisha-him:latest
    restart: unless-stopped
    networks:
      - openhim
    environment:
      OPENHIM_CONSOLE_PROTOCOL: "https"
      OPENHIM_CORE_MEDIATOR_HOSTNAME: "202.51.71.81"
      OPENHIM_MEDIATOR_API_PORT: "8080"
      OPENHIM_CONSOLE_HOSTPATH: ""
      OPENHIM_CONSOLE_SHOW_LOGIN: "true"
      OPENHIM_MEDIATOR_HEALTH_WARNING_TIMEOUT: "60"
      OPENHIM_MEDIATOR_HEALTH_DANGER_TIMEOUT: "120"
    ports:
      - "9000:80"
    healthcheck:
      test: "curl -sS http://openhim-console || exit 1"
      interval: 30s
      timeout: 30s
      retries: 3
    depends_on:
      - openhim-core

  fhir:
    container_name: fhir
    image: hapiproject/hapi:latest
    restart: unless-stopped
    networks:
      - openhim
    depends_on:
      hapi-db:
        condition: service_healthy
    ports:
      - "8081:8080"
    volumes:
      - ./hapi-config/application.yaml:/app/config/application.yaml:ro
      - ./hapi-config/mdm-rules.json:/app/config/mdm-rules.json:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/fhir/metadata || exit 1"]
      interval: 30s
      timeout: 20s
      retries: 10
  
  patient-mediator:
    container_name: patient-mediator
    build:
      context: ./patient-mediator
    # restart: unless-stopped
    networks:
      - openhim
    volumes:
      - "./patient-mediator:/app"
      - "/app/node_modules"
    command: sh -c "npm install && npm run dev"
    env_file:
      - ./patient-mediator/.env
    ports:
      - "3000:3000"
    depends_on:
      - "openhim-core"
      - "fhir"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  organization-mediator:
    container_name: organization-mediator
    build:
      context: ./organization-mediator
    networks:
      - openhim
    volumes:
      - "./organization-mediator:/app"
      - "/app/node_modules"
    command: sh -c "npm install && npm run dev"
    env_file:
      - ./organization-mediator/.env
    ports:
      - "3001:3001"
    depends_on:
      - "openhim-core"
      - "fhir"

  # encounter-mediator:
  #   container_name: encounter-mediator
  #   build:
  #     context: ./encounter-mediator
  #   networks:
  #     - openhim
  #   volumes:
  #     - "./encounter-mediator:/app"
  #     - "/app/node_modules"
  #   command: sh -c "npm install && npm run dev"
  #   env_file:
  #     - ./encounter-mediator/.env
  #   ports:
  #     - "3002:3002"
  #   depends_on:
  #     - "openhim-core"
  #     - "fhir"

  registration-mediator:
    container_name: registration-mediator
    build:
      context: ./registration-mediator
    networks:
      - openhim
    volumes:
      - "./registration-mediator:/app"
      - "/app/node_modules"
    command: sh -c "npm install && npm run dev"
    env_file:
      - ./registration-mediator/.env
    ports:
      - "3003:3003"
    depends_on:
      - "openhim-core"
      - "fhir"
